<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CommerceHub Merchant Demo — Cash App Pay</title>
  <link rel="stylesheet" href="/src/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
</head>
<body>
  <div class="demo-page">
    <!-- Header -->
    <div class="demo-header">
      <div class="demo-header-content">
        <div class="demo-logo">
          <span class="logo-icon">F</span>
          <div>
            <div class="logo-title">CommerceHub</div>
            <div class="logo-subtitle">Cash App Pay Integration Demo</div>
          </div>
        </div>
        <div class="demo-badges">
          <span class="badge badge-sandbox">Sandbox</span>
          <span class="badge badge-version">SDK v2.6.0</span>
        </div>
      </div>
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="demo">Demo</button>
      <button class="tab-btn" data-tab="docs">Documentation</button>
      <button class="tab-btn" data-tab="guide">Getting Started</button>
    </div>

    <!-- Tab: Demo (phone + trace) -->
    <div id="tab-demo" class="tab-content active">
      <div class="demo-content">
        <!-- Phone mockup -->
        <div class="phone-frame">
          <div class="phone-notch"></div>
          <div class="phone-status-bar">
            <span class="status-time">9:41</span>
            <span class="status-icons">
              <span class="status-signal">&#9679;&#9679;&#9679;&#9679;</span>
              <span class="status-wifi">&#9681;</span>
              <span class="status-battery">&#128267;</span>
            </span>
          </div>
          <div id="app-screen" class="phone-screen"></div>
          <div class="phone-home-bar"></div>
        </div>

        <!-- Trace Panel -->
        <div class="trace-panel">
          <div class="trace-header">
            <span class="trace-title">SDK Event Trace</span>
            <button class="trace-clear" data-trace-clear>Clear</button>
          </div>
          <div id="trace-log" class="trace-log"></div>
        </div>
      </div>

      <!-- Backend status -->
      <div id="backend-status" class="backend-status">
        <span class="status-dot"></span>
        <span class="status-text">Checking backend...</span>
      </div>
    </div>

    <!-- Tab: Documentation -->
    <div id="tab-docs" class="tab-content">
      <div id="docs-content" class="docs-layout"></div>
    </div>

    <!-- Tab: Getting Started -->
    <div id="tab-guide" class="tab-content">
      <div id="guide-content" class="guide-layout"></div>
    </div>
  </div>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
